services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  etl:
    build: ./etl
    env_file: .env
    volumes:
      - ./data:/data:ro
    depends_on:
      - postgres

  training:
    build: ./training
    env_file: .env
    volumes:
      - artifacts:/artifacts
    depends_on:
      - postgres

  api:
    build: ./api
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - artifacts:/artifacts
    depends_on:
      - postgres

volumes:
  pg_data:
  artifacts:
